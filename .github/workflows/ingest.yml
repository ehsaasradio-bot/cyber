name: Ingest threat feeds

on:
  schedule:
    # Every 6 hours (UTC): 00:00, 06:00, 12:00, 18:00. Change this cron to adjust frequency.
    - cron: "0 */6 * * *"
  # Lets you run it manually from the Actions tab to test.
  workflow_dispatch:

# Prevent overlapping runs if one ingest takes longer than the interval.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run ingest
        run: npm run ingest:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ABUSECH_AUTH_KEY: ${{ secrets.ABUSECH_AUTH_KEY }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
